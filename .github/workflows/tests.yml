name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_heavy:
        description: "Run full pipeline smoke test (requires datasets in datasets/raw/)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# Cancel any in-progress run for the same branch/PR so pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Unit tests (no model download, no GPU, fast)
  # Covers: FASTA parser, preprocessor, augmentation, dataset collation
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only PyTorch (avoids pulling in CUDA drivers, ~800 MB lighter)
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --junitxml=reports/unit-results.xml \
            -p no:warnings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: reports/unit-results.xml
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Integration tests (component-level, no ESM-2 download)
  # Covers: CNN encoder, BiLSTM encoder, attention block, prediction head,
  #         full pipeline forward pass using mock embeddings
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests  # Only run if unit tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short \
            --junitxml=reports/integration-results.xml \
            -p no:warnings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/integration-results.xml
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — API tests (fixture model — no ESM-2 download, no checkpoint needed)
  # Covers: /predict, /predict_batch, /model_info, /health, /metrics
  #
  # Uses a tiny nn.Embedding (dim=64) in place of ESM-2 so the full FastAPI
  # HTTP surface is tested without downloading model weights.
  # See tests/api/conftest.py for full rationale.
  # ────────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: unit-tests  # Only run if unit tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Run API tests
        run: |
          pytest tests/api/ -v --tb=short \
            --junitxml=reports/api-results.xml \
            -p no:warnings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: reports/api-results.xml
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Summary job — requires all three test jobs to pass
  # ────────────────────────────────────────────────────────────────────────────
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, api-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.api-tests.result }}" != "success" ]]; then
            echo "API tests failed"
            exit 1
          fi
          echo "All test jobs passed."

  # ────────────────────────────────────────────────────────────────────────────
  # Optional slow job — full ESM-2 + dataset pipeline (manual trigger only)
  #
  # NOT run on every push. Trigger manually via:
  #   gh workflow run tests.yml --field run_heavy=true
  #
  # Requirements:
  #   - datasets must be pre-placed in datasets/raw/ (Princeton URLs are dead;
  #     see docs/README.md for download instructions)
  #   - A GPU runner is strongly recommended; CPU will take hours
  # ────────────────────────────────────────────────────────────────────────────
  slow-pipeline-check:
    name: Full Pipeline Smoke Test (manual only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_heavy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt

      - name: Generate embeddings (subset)
        run: |
          python scripts/generate_embeddings.py --batch-size 2 --device cpu
        continue-on-error: true  # Don't fail CI if datasets aren't present

      - name: Smoke-test training (2 epochs)
        run: |
          python train.py --device cpu --epochs 2 --batch-size 2
        continue-on-error: true
