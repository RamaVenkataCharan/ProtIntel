# ProtIntel — Model Architecture Configuration

model:
  # ESM-2 backbone
  esm2:
    model_name: "facebook/esm2_t12_35M_UR50D"
    embedding_dim: 480
    freeze: true                    # Freeze all ESM-2 parameters
    finetune_last_n_layers: 0       # Number of last transformer layers to unfreeze (0 = fully frozen)

  # Multi-scale CNN encoder
  cnn:
    input_dim: 480                  # Must match ESM-2 embedding_dim
    hidden_dim: 512
    kernel_sizes: [3, 5, 7]         # Multi-scale convolution kernels
    num_residual_blocks: 3
    dropout: 0.1

  # Bidirectional LSTM encoder
  bilstm:
    input_dim: 512                  # Must match CNN hidden_dim
    hidden_dim: 256                 # Per direction; output = 2 * hidden_dim = 512
    num_layers: 2
    dropout: 0.3
    bidirectional: true

  # Multi-head self-attention
  attention:
    embed_dim: 512                  # Must match BiLSTM output dim (2 * hidden_dim)
    num_heads: 8
    dropout: 0.1

  # Feed-forward block after attention
  feedforward:
    hidden_dim: 1024
    dropout: 0.1

  # Prediction heads
  q3_head:
    input_dim: 512                  # Must match attention embed_dim
    hidden_dim: 256
    num_classes: 3
    dropout: 0.2

  q8_head:
    input_dim: 512
    hidden_dim: 256
    num_classes: 8
    dropout: 0.2
