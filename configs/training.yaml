# ProtIntel — Training Configuration

training:
  # Core training parameters
  epochs: 100
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  gradient_clip_norm: 1.0
  gradient_accumulation_steps: 4
  mixed_precision: true             # torch.cuda.amp automatic mixed precision
  finetune_mode: true               # Disable embedding cache ONLY when ESM-2 layers are unfrozen

  # Optimizer
  optimizer: adamw                  # adamw | adam | sgd
  optimizer_params:
    betas: [0.9, 0.999]
    eps: 1.0e-8

  # Learning rate scheduler
  scheduler: reduce_on_plateau     # reduce_on_plateau | cosine | onecycle
  scheduler_params:
    # ReduceLROnPlateau
    factor: 0.5
    patience: 5
    min_lr: 1.0e-7
    # CosineAnnealingWarmRestarts (used if scheduler: cosine)
    T_0: 10
    T_mult: 2
    # OneCycleLR (used if scheduler: onecycle)
    max_lr: 5.0e-4
    pct_start: 0.3

  # Warmup
  warmup_epochs: 3
  warmup_start_lr: 1.0e-6

  # Early stopping
  early_stopping:
    enabled: true
    patience: 15
    monitor: val_q3_accuracy
    mode: max                       # max | min
    min_delta: 0.001

  # Loss function
  loss:
    type: focal                     # cross_entropy | focal
    label_smoothing: 0.1
    use_class_weights: true         # Compute weights from inverse class frequency
    # Focal loss parameters (used if type: focal)
    focal_gamma: 3.0
    focal_alpha: null               # null = compute from class frequencies

  # Multi-task loss weighting
  task_weights:
    q3: 1.0
    q8: 0.5                        # Q3 is primary objective

  # Checkpointing
  checkpoint:
    save_top_k: 3
    monitor: val_q3_accuracy
    mode: max
    save_dir: models/

  # Logging
  logging:
    tensorboard: true
    tensorboard_dir: logs/
    wandb: false
    wandb_project: protintel
    log_every_n_steps: 50
    log_model_graph: true

  # Reproducibility
  seed: 42
  deterministic: true
