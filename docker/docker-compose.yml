version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        TORCH_VARIANT: cpu  # Change to 'gpu' for CUDA support
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../datasets:/app/datasets
      - ../logs:/app/logs
    environment:
      - MODEL_PATH=/app/models/best_checkpoint.pt
      - DEVICE=cpu
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
